name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: faraday-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.1

      - name: Cache dependencies
        run: deno cache --frozen src/*.ts src/zemer/*.ts scripts/*.ts test/*.ts test/integration/*.ts

      - name: CI
        run: deno task --frozen ci
