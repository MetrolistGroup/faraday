name: Probe YouTube Player

"on":
  push:
    branches: [master]
  schedule:
    - cron: "*/25 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: probe-youtube-player
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.FARADAY_RELEASE_TOKEN || github.token }}
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        run: deno cache scripts/probe-player.ts test/registry.test.ts

      - name: Run tests
        run: deno task test

      - name: Typecheck
        run: deno task typecheck

      - name: Probe current player
        run: deno task probe:player

      - name: Commit registry update
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "Update YouTube player registry"
          commit_user_name: ${{ github.actor }}
          commit_user_email: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com
          commit_author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          file_pattern: registry/player-registry.json registry/players/*.json

      - name: Create player release
        env:
          GH_TOKEN: ${{ secrets.FARADAY_RELEASE_TOKEN || github.token }}
        run: |
          PLAYER_HASH="$(jq -er '.current.playerHash // empty' registry/player-registry.json)"
          TAG="player-${PLAYER_HASH}"
          CONFIG_PATH="registry/players/${PLAYER_HASH}.json"
          test -f "${CONFIG_PATH}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "${TAG} already exists."
          else
            git tag "${TAG}"
            git push origin "refs/tags/${TAG}"
          fi
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
            gh release upload "${TAG}" "${CONFIG_PATH}#player-${PLAYER_HASH}.json" --clobber
          else
            gh release create "${TAG}" "${CONFIG_PATH}#player-${PLAYER_HASH}.json" \
              --verify-tag \
              --title "YouTube player ${PLAYER_HASH}" \
              --notes "Validated base64-encoded yt-dlp EJS preprocessed-player config for YouTube player ${PLAYER_HASH}."
          fi
